services:
  - type: web
    name: product-catalog
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/seed.py && mkdir -p backend/static && cp -r frontend/* backend/static/"
    startCommand: "python -m uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        value: catalog.db
      - key: PYTHON_VERSION
        value: 3.12.3
